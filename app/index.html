<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Ojito</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="canvas">
    <iframe id="project-frame" title="Preview del proyecto"></iframe>
    <button id="mobile-inspect-btn" aria-label="Inspeccionar elemento" class="mobile-fab">
      <span class="eye-icon">&#x1F441;</span>
      <span class="mobile-fab-label">Inspeccionar</span>
    </button>
  </div>

  <aside id="inspector" role="complementary" aria-label="Inspector de elementos">
    <div id="react-panel"></div>
  </aside>

  <script src="app.js"></script>
</body>
</html>
