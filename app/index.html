<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ojito</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="canvas">
    <iframe id="project-frame"></iframe>
  </div>
  <div id="inspector">
    <div class="panel-header">
      <div class="panel-header-title">
        <span class="icon">&#x1F441;</span>
        <span>ojito</span>
      </div>
      <div class="status-indicator">
        <span class="status-dot" id="status-dot"></span>
        <span id="status-text">inactivo</span>
      </div>
    </div>
    <div class="panel-body">
      <div class="section" id="element-section">
        <div class="section-label">Elemento</div>
        <div id="element-info">
          <div class="empty-state">
            <span class="empty-icon">&#x1F441;</span>
            <span class="empty-text">Activa el inspector y
haz click en un elemento</span>
          </div>
        </div>
      </div>
      <div class="divider"></div>
      <div class="section" id="tree-section">
        <div class="section-label">Capas</div>
        <div id="tree-container">
          <div class="empty-state">
            <span class="empty-text">El arbol aparece al
seleccionar un elemento</span>
          </div>
        </div>
      </div>
    </div>
  </div>
  <button id="fab">&#x1F441;</button>
  <script src="app.js"></script>
</body>
</html>
